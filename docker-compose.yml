services:
  api:
    image: pranavthegoat/todo-api:latest
    container_name: todo-api
    depends_on:
      - mongo
    env_file:
      - ./api/.env

  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data: